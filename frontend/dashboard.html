<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Boshqaruv Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">EDU PANEL</a>
            <div class="d-flex align-items-center gap-3">
                <span id="userName" class="text-white">...</span>
                <button class="btn btn-outline-danger btn-sm" onclick="logout()">Chiqish</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row">
            <!-- Sidebar / Stats -->
            <div class="col-md-3">
                <div class="card p-3 mb-3 border-0 shadow-sm">
                    <h5>Statistika</h5>
                    <hr>
                    <p>Postlar: <strong id="postCount">0</strong></p>
                    <p>Foydalanuvchilar: <strong>15</strong></p>
                </div>
                <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#addPostModal">Yangi Post Qo'shish</button>
            </div>

            <!-- Main Content (Posts Feed) -->
            <div class="col-md-9">
                <div id="postsList" class="row">
                    <!-- Posts will be loaded here via AJAX -->
                    <div class="text-center py-5">
                        <div class="spinner-border text-primary" role="status"></div>
                        <p>Yuklanmoqda...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Post Modal -->
    <div class="modal fade" id="addPostModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Yangi Post</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPostForm">
                        <div class="mb-3">
                            <label class="form-label">Sarlavha</label>
                            <input type="text" id="postTitle" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tavsif</label>
                            <textarea id="postDesc" class="form-control" rows="3" required></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Rasm (Ixtiyoriy)</label>
                            <input type="file" id="postImage" class="form-control" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Saqlash</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Check Auth on load
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadPosts();
        });
    </script>
</body>
</html>
