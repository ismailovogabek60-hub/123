<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Boshqaruv Paneli</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #0f172a; color: #f8fafc; min-height: 100vh; }
        .navbar { background: rgba(15,23,42,0.9); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.06); }
        .stat-card {
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 1.5rem;
            transition: 0.3s;
        }
        .stat-card:hover { border-color: #6366f1; transform: translateY(-3px); }
        .stat-card h4 { font-size: 2rem; font-weight: 800; color: #818cf8; }
        .post-card {
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            overflow: hidden;
            transition: 0.3s;
        }
        .post-card:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-4px); }
        .post-card img { width: 100%; height: 200px; object-fit: cover; }
        .post-card .card-body { padding: 1.5rem; }
        .post-card h5 { font-weight: 700; }
        .btn-primary { background: #6366f1; border: none; border-radius: 10px; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-outline-danger { border-radius: 8px; }
        .btn-outline-warning { border-radius: 8px; }
        .modal-content { background: #1e293b; color: white; border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            border-radius: 10px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.2);
            color: white;
        }
        .empty-state { text-align: center; padding: 4rem 1rem; color: #64748b; }
        .empty-state span { font-size: 3rem; display: block; margin-bottom: 1rem; }
        .chat-box {
            background: rgba(30,41,59,0.6);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            height: 300px;
            overflow-y: auto;
            padding: 1rem;
        }
        .chat-msg { background: rgba(255,255,255,0.05); padding: 0.5rem 1rem; border-radius: 10px; margin-bottom: 0.5rem; }
        .chat-msg strong { color: #818cf8; }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">EDU <span style="color:#818cf8">Platform</span></a>
            <div class="d-flex align-items-center gap-3">
                <span id="userName" class="text-secondary small"></span>
                <span id="userRole" class="badge bg-primary"></span>
                <button class="btn btn-sm btn-outline-danger" onclick="logout()">Chiqish</button>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <!-- Stats Row -->
        <div class="row mb-4">
            <div class="col-md-4 mb-3">
                <div class="stat-card">
                    <p class="text-secondary small mb-1">Jami Postlar</p>
                    <h4 id="postCount">0</h4>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="stat-card">
                    <p class="text-secondary small mb-1">Foydalanuvchilar</p>
                    <h4 id="userCount">0</h4>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="stat-card">
                    <p class="text-secondary small mb-1">Xabarlar</p>
                    <h4 id="msgCount">0</h4>
                </div>
            </div>
        </div>

        <!-- Actions -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h5 class="fw-bold mb-0">Postlar</h5>
            <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addPostModal">+ Yangi Post</button>
        </div>

        <!-- Posts Grid -->
        <div id="postsList" class="row"></div>

        <!-- Chat Section -->
        <hr style="border-color: rgba(255,255,255,0.08); margin: 3rem 0;">
        <h5 class="fw-bold mb-3">💬 Chat</h5>
        <div id="chatBox" class="chat-box mb-3"></div>
        <div class="d-flex gap-2">
            <input type="text" id="chatInput" class="form-control" placeholder="Xabar yozing...">
            <button class="btn btn-primary" onclick="sendMessage()">Yuborish</button>
        </div>
    </div>

    <!-- Add Post Modal -->
    <div class="modal fade" id="addPostModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Yangi Post Qo'shish</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addPostForm">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Sarlavha</label>
                            <input type="text" id="postTitle" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Tavsif</label>
                            <textarea id="postDesc" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Saqlash</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Post Modal -->
    <div class="modal fade" id="editPostModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">Postni Tahrirlash</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editPostForm">
                        <input type="hidden" id="editPostId">
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Sarlavha</label>
                            <input type="text" id="editTitle" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-secondary small">Tavsif</label>
                            <textarea id="editDesc" class="form-control" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Yangilash</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/db.js"></script>
    <script src="js/dashboard.js"></script>
</body>
</html>
