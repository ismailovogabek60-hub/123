<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ta'lim Loyihasi | Kirish</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
    <div class="container d-flex align-items-center justify-content-center vh-100">
        <div class="card shadow-lg p-4" style="width: 400px; border-radius: 20px;">
            <div class="text-center mb-4">
                <h2 class="fw-bold">Xush Kelibsiz</h2>
                <p class="text-muted">Tizimga kirish uchun ma'lumotlarni kiriting</p>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="loginEmail" class="form-control" placeholder="admin@example.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Parol</label>
                    <input type="password" id="loginPass" class="form-control" placeholder="password" required>
                </div>
                <button type="submit" class="btn btn-primary w-100 py-2">Kirish</button>
            </form>

            <div class="text-center mt-3">
                <small>Hisobingiz yo'qmi? <a href="#" onclick="toggleAuth(true)">Ro'yxatdan o'tish</a></small>
            </div>

            <!-- Register Form (Hidden by default) -->
            <form id="registerForm" class="d-none">
                <div class="mb-3">
                    <label class="form-label">Foydalanuvchi nomi</label>
                    <input type="text" id="regUser" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email</label>
                    <input type="email" id="regEmail" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Parol</label>
                    <input type="password" id="regPass" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-success w-100 py-2">Ro'yxatdan o'tish</button>
                <div class="text-center mt-3">
                    <small>Hisobingiz bormi? <a href="#" onclick="toggleAuth(false)">Kirish</a></small>
                </div>
            </form>
        </div>
    </div>

    <!-- JS Scripts -->
    <script src="js/app.js"></script>
</body>
</html>
